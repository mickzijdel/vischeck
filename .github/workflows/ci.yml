name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4   # installs shellcheck/shfmt/ruff/uv honoring mise.lock (same versions as pre-commit)
      - name: Run shellcheck
        # *.sh/*.bash plus extensionless shell scripts detected by shebang (bin/vischeck-hook)
        # — mirrors the hk `shellcheck-scripts` step so CI and pre-commit agree.
        run: |
          files=$( { git ls-files '*.sh' '*.bash'; git ls-files ':!*.sh' ':!*.bash' | while IFS= read -r f; do head -n1 "$f" 2>/dev/null | grep -qE '^#!.*\b(ba)?sh\b' && printf '%s\n' "$f"; done; } | sort -u )
          if [ -n "$files" ]; then shellcheck $files; else echo "no shell files, skipping"; fi
      - name: Check formatting (shfmt)
        # shfmt's directory walk already detects extensionless shell scripts by shebang,
        # so `.` covers bin/vischeck-hook too.
        run: shfmt -d .
      - name: Run ruff (Python incl. extensionless PEP 723 scripts)
        # *.py plus extensionless python/uv scripts (bin/screenshot, bin/screenshots)
        # detected by shebang — mirrors the hk ruff-*-scripts steps.
        run: |
          files=$( { git ls-files '*.py'; git ls-files ':!*.py' | while IFS= read -r f; do head -n1 "$f" 2>/dev/null | grep -qE '^#!.*(python|uv run)' && printf '%s\n' "$f"; done; } | sort -u )
          if [ -n "$files" ]; then ruff check $files && ruff format --check $files; else echo "no python files, skipping"; fi
      - name: Executable bits on shipped scripts
        # Any tracked file whose first line is a shebang must be mode 100755 in the
        # index — with core.fileMode=false a local chmod never reaches git, and a
        # 100644 script dies with exit 126 on every fresh clone / plugin install.
        # Mirrors the hk `exec-bit-scripts` step so CI and pre-commit agree.
        run: |
          bad=$(git ls-files -s | awk -F'\t' '$1 ~ /^100644/ { if ((getline line < $2) > 0 && line ~ /^#!/) print $2; close($2) }')
          if [ -n "$bad" ]; then
            echo "Shebang scripts missing the executable bit in the git index. Fix: git update-index --chmod=+x <file>"
            echo "$bad"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      # Plugin/script repos: run the test suite for bundled scripts (see readoc's
      # tests/ + pyproject.toml dev project for the preferred pattern).
      - name: Run tests
        run: uv run pytest --tb=short

  # Run the MIT-licensed gitleaks CLI (via mise, version-pinned in mise.lock) rather than
  # gitleaks/gitleaks-action: the action requires a paid GITLEAKS_LICENSE on org-owned repos,
  # while the CLI is free for all repos and is exactly what the local hk pre-commit hook runs.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # gitleaks git scans the full commit history
      - uses: jdx/mise-action@v4
      - name: Scan git history for secrets
        run: mise exec -- gitleaks git --redact --no-banner .

  # Noisier audits — mirror the hk `check` hook (not run on pre-commit).
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Dead code (vulture, Python incl. extensionless PEP 723 scripts)
        run: |
          # tracked .py + any tracked file with a python/uv shebang (e.g. bin/screenshot).
          # git ls-files excludes gitignored .venv automatically.
          files=$( { git ls-files '*.py'; git ls-files | while IFS= read -r f; do head -n1 "$f" 2>/dev/null | grep -qE '^#!.*(python|uv run)' && printf '%s\n' "$f"; done; } | sort -u )
          if [ -n "$files" ]; then uvx vulture --min-confidence 80 $files; else echo "no python files, skipping"; fi
      - name: Duplication (jscpd)
        # -f scopes to code formats (no config equivalent); .jscpd.json carries
        # minTokens/threshold/reporters/gitignore/ignorePattern.
        # Runner + version policy (latest on a 4-day cooldown, floored at v5 — see
        # SKILL.md › jscpd version policy) are shared with the hk pre-commit gate via
        # scripts/run-jscpd.sh; --require keeps CI strict (unrunnable jscpd fails the job).
        run: bash scripts/run-jscpd.sh --require python,bash
      - name: Large files
        run: |
          limit=512000
          large=$(git ls-files | while read -r f; do
            s=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$s" -gt "$limit" ]; then echo "$f ($s bytes)"; fi
          done)
          if [ -n "$large" ]; then echo "Files exceed ${limit} bytes:"; echo "$large"; exit 1; fi
